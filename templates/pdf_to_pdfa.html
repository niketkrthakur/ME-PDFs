{% extends "layout.html" %}
{% block content %}

<div class="container py-5 text-center">
    <i class="bi bi-file-earmark-pdf-fill text-danger" style="font-size: 4rem;"></i>    
    <h2 class="fw-bold mb-3">PDF to PDF/A</h2>
    <p class="text-muted mb-4">
        Convert PDF into archival format (PDF/A compliant)
    </p>

    <form method="POST" enctype="multipart/form-data">

        <!-- Upload PDF -->
        <input type="file" name="file" class="form-control mb-3" required>

        <!-- ✅ ADD THIS HERE -->
        <label class="form-label">Select PDF/A Version</label>
        <select name="version" class="form-control mb-3">
            <option value="1">PDF/A-1 (Most strict)</option>
            <option value="2" selected>PDF/A-2 (Recommended)</option>
            <option value="3">PDF/A-3 (Modern)</option>
        </select>

        <!-- Convert Button -->
        <button type="submit" class="btn btn-danger w-100">
            Convert to PDF/A
        </button>

    </form>

</div>

{% endblock %}
