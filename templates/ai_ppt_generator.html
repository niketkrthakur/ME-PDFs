{% extends "layout.html" %}
{% block content %}

<div class="container py-5">
<div class="glass-card mx-auto" style="max-width:800px;">

<h3 class="fw-bold text-danger mb-4">
<i class="bi bi-file-ppt me-2"></i> AI PowerPoint Generator
</h3>

<form method="POST">

<label class="form-label">Presentation Topic</label>

<textarea name="topic"
class="form-control mb-3"
rows="5"
placeholder="Example: Create a presentation on Artificial Intelligence in Healthcare"></textarea>

<button class="btn btn-danger">
Generate PowerPoint
</button>

</form>

</div>
</div>

{% endblock %}
