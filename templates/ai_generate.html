{% extends "layout.html" %}
{% block content %}

<div class="container py-5">
<div class="glass-card mx-auto" style="max-width:800px;">

<h3 class="fw-bold text-danger mb-4">
<i class="bi-robot"></i> AI Document Generator
</h3>

<form method="POST">

<label class="form-label">Document Type</label>

<select name="doc_type" class="form-select mb-3">
<option value="document">General Document</option>
<option value="resume">Resume</option>
<option value="report">Report</option>
<option value="letter">Letter</option>
<option value="notes">Study Notes</option>
</select>

<label class="form-label">Describe what you want</label>

<textarea name="prompt"
class="form-control mb-3"
rows="6"
placeholder="Example: Create a professional resume for a Python developer with 3 years experience"></textarea>

<button class="btn btn-danger">
Generate Document
</button>

</form>

</div>
</div>

{% endblock %}
