{% extends "layout.html" %}
{% block content %}

<div class="container py-5 text-center">
    <i class="bi bi-file-earmark-spreadsheet-fill text-danger" style="font-size: 4rem;"></i>
    <h2 class="fw-bold mb-3">AI PDF to Excel</h2>
    <p class="text-muted mb-4">
        Smart extraction using AI (works even on messy PDFs)
    </p>

    <form method="POST" enctype="multipart/form-data">

        <input type="file" name="file" accept=".pdf" required class="form-control mb-3">

        <button class="btn btn-danger px-4">
            Convert with AI
        </button>

    </form>

</div>

{% endblock %}
